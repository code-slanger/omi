services:
  nano-claw:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./service/.env
    volumes:
      - /home/lucho/omi/data:/app/data        # uploads, profiles, feed state, generated outputs
      - /home/lucho/obsidian:/app/vault        # Obsidian vault (read+write)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Radicale — self-hosted CalDAV/CardDAV calendar server ─────────────────
  radicale:
    image: tomsquest/docker-radicale:latest
    ports:
      - "5232:5232"
    volumes:
      - /home/lucho/radicale/data:/data            # calendar data
      - /home/lucho/radicale/config:/config        # radicale config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Caddy — HTTPS reverse proxy with Porkbun DNS challenge ────────────────
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "443:443"
      - "80:80"
    environment:
      PORKBUN_API_KEY: pk1_34dbb9d020825f8887df575964abdceaa7d6661eaf24e09b93764eec5ee4810e
      PORKBUN_SECRET_KEY: sk1_c0759d17bacebe3bd92938dabd9b01f2dca90db168d64d3320b178ad065a5f24
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nano-claw
      - radicale
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

  # ── Ollama — local LLM server (optional) ──────────────────────────────────
  # Set OLLAMA_BASE_URL=http://ollama:11434 in service/.env to enable.
  # To pull a model after first start:
  #   docker compose exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - /home/lucho/ollama/models:/root/.ollama   # persist model weights
    restart: unless-stopped
    profiles:
      - ollama   # only starts with: docker compose --profile ollama up
