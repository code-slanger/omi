services:
  nano-claw:
    build:
      context: ..                          # omi/ root — corpus/ in scope
      dockerfile: pi/service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./service/.env
    volumes:
      - /home/lucho/omi/data:/app/data        # uploads, profiles, feed state, generated outputs
      - /home/lucho/vault:/app/vault            # Obsidian vault (read+write)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Corpus UI — ingest and manage the personal media corpus ─────────────
  corpus-ui:
    build:
      context: ..                          # omi/ root — corpus/ and corpus-ui/ both in scope
      dockerfile: corpus-ui/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./service/.env                     # shares same .env as nano-claw
    environment:
      - DATA_DIR=/app/data
    volumes:
      - /home/lucho/omi/data:/app/data     # same data volume as nano-claw
    restart: unless-stopped

  # ── Radicale — self-hosted CalDAV/CardDAV calendar server ─────────────────
  radicale:
    image: tomsquest/docker-radicale:latest
    ports:
      - "5232:5232"
    volumes:
      - /home/lucho/radicale/data:/data            # calendar data
      - /home/lucho/radicale/config:/config        # radicale config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Caddy — HTTPS reverse proxy with Porkbun DNS challenge ────────────────
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "443:443"
      - "80:80"
    env_file:
      - ./service/.env
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nano-claw
      - radicale
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

  # ── Ollama — local LLM for digest summarisation (no API cost) ─────────────
  # After first deploy, pull the model:
  #   docker --context lucho compose exec ollama ollama pull llama3.2:1b
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - /home/lucho/ollama/models:/root/.ollama
    restart: unless-stopped
